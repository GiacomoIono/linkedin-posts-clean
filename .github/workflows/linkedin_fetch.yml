name: LinkedIn to X Full Pipeline
concurrency:
  group: linkedin-to-x-pipeline
  cancel-in-progress: true

on:
  schedule:
    # Every day at 7pm
    - cron:  '0 17 * * *'
  workflow_dispatch:    # enables manual run from the Actions tab

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: ↵ Check out repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🔐 Set all required env vars
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          echo "LINKEDIN_ACCESS_TOKEN=$LINKEDIN_ACCESS_TOKEN" >> $GITHUB_ENV
          echo "OPENAI_API_KEY=$OPENAI_API_KEY" >> $GITHUB_ENV
          echo "X_API_KEY=$X_API_KEY" >> $GITHUB_ENV
          echo "X_API_SECRET=$X_API_SECRET" >> $GITHUB_ENV
          echo "X_ACCESS_TOKEN=$X_ACCESS_TOKEN" >> $GITHUB_ENV
          echo "X_ACCESS_TOKEN_SECRET=$X_ACCESS_TOKEN_SECRET" >> $GITHUB_ENV

      - name: 📥 Fetch latest LinkedIn post
        run: |
          set +e
          python fetch_posts.py
          status=$?
          set -e

          if [ "$status" -eq 2 ]; then
            echo "NO_POSTS_FOUND=true" >> "$GITHUB_ENV"
            echo "No recent LinkedIn posts found. Skipping enrichment and X steps."
            exit 0
          fi

          if [ "$status" -ne 0 ]; then
            echo "LinkedIn fetch failed with exit code $status."
            exit "$status"
          fi

          echo "NO_POSTS_FOUND=false" >> "$GITHUB_ENV"

      - name: 🧠 Generate Webflow CMS JSON
        if: env.NO_POSTS_FOUND != 'true'
        run: python enrich_post.py

      - name: 🐦 Generate X draft (optional)
        if: env.NO_POSTS_FOUND != 'true'
        run: |
          set +e
          python Twitter/tweetify_post.py
          status=$?

          if [ "$status" -ne 0 ]; then
            echo "::warning::tweetify_post.py failed with exit code $status. Continuing because X is optional."
          fi

          exit 0

      - name: 📣 Post to X (optional)
        if: env.NO_POSTS_FOUND != 'true'
        run: |
          set +e
          python Twitter/post_tweet.py
          status=$?

          if [ "$status" -ne 0 ]; then
            echo "::warning::post_tweet.py failed with exit code $status. Continuing because X is optional."
          fi

          exit 0

      - name: 📤 Commit & push results if new post was found
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config pull.rebase true
          git config rebase.autoStash true

          # Skip if nothing relevant changed
          if git diff --quiet -- 'last_linkedin_post.json' 'last_linkedin_post.enriched.json' 'Twitter/tweet.json' 'Twitter/posted_tweets.json'; then
            echo "No new post or changes to commit."
            exit 0
          fi

          # Commit local changes first
          git add last_linkedin_post.json last_linkedin_post.enriched.json Twitter/tweet.json Twitter/posted_tweets.json
          git commit -m "chore(bot): Update post files for $(date -u +'%Y-%m-%d')"

          # Rebase onto latest remote; handle conflicts gracefully
          git fetch origin main
          if ! git rebase origin/main; then
            echo "⚠️ Rebase conflict; aborting and skipping push this run."
            git rebase --abort || true
            exit 0
          fi

          # Push only if we're actually ahead
          if git diff --quiet HEAD origin/main; then
            echo "Nothing new to push (already up to date)."
            exit 0
          fi

          git push origin HEAD:main