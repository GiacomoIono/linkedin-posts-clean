name: Webflow CMS Pipeline
concurrency:
  group: webflow-cms-pipeline
  cancel-in-progress: true

on:
  schedule:
    # GitHub schedules use UTC. These two slots cover 20:00 Europe/Zurich across DST.
    - cron: '0 18,19 * * *'
  workflow_dispatch:

jobs:
  publish-cms:
    runs-on: ubuntu-latest

    steps:
      - name: Check Zurich schedule time
        id: zurich_time
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          from datetime import datetime
          from zoneinfo import ZoneInfo

          now = datetime.now(ZoneInfo("Europe/Zurich"))
          print(f"zurich_now={now.isoformat()}")
          print(f"run_cms_pipeline={'true' if now.hour == 20 else 'false'}")
          PY

      - name: Skip scheduled non-8pm run
        if: github.event_name == 'schedule' && steps.zurich_time.outputs.run_cms_pipeline != 'true'
        run: |
          echo "Current Zurich time is ${{ steps.zurich_time.outputs.zurich_now }}."
          echo "Skipping this scheduled slot because the CMS pipeline runs at 20:00 Europe/Zurich."

      - name: Check out repo
        if: github.event_name == 'workflow_dispatch' || steps.zurich_time.outputs.run_cms_pipeline == 'true'
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        if: github.event_name == 'workflow_dispatch' || steps.zurich_time.outputs.run_cms_pipeline == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: github.event_name == 'workflow_dispatch' || steps.zurich_time.outputs.run_cms_pipeline == 'true'
        run: pip install -r requirements.txt

      - name: Run Webflow CMS pipeline
        if: github.event_name == 'workflow_dispatch' || steps.zurich_time.outputs.run_cms_pipeline == 'true'
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5-nano
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_READ_AND_WRITE_BLOG_POSTS || vars.WEBFLOW_READ_AND_WRITE_BLOG_POSTS }}
          WEBFLOW_COLLECTION_ID: '63250855178122098387d7ef'
          WEBFLOW_PUBLISH: 'true'
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_CLIENT_ID: ${{ secrets.X_CLIENT_ID }}
          X_CLIENT_SECRET: ${{ secrets.X_CLIENT_SECRET }}
          REQUIRE_X_POSTING: 'false'
        run: |
          set +e
          python -m pipeline.main
          status=$?
          set -e

          if [ "$status" -eq 2 ]; then
            echo "No recent LinkedIn posts found. Nothing to publish."
            exit 0
          fi

          exit "$status"

      - name: Commit and push pipeline outputs
        if: github.event_name == 'workflow_dispatch' || steps.zurich_time.outputs.run_cms_pipeline == 'true'
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config pull.rebase true
          git config rebase.autoStash true

          changed_files=$(git status --porcelain -- \
            data \
            last_linkedin_post.json \
            last_linkedin_post.enriched.json \
            Twitter/tweet.json \
            Twitter/posted_tweets.json \
            images)

          if [ -z "$changed_files" ]; then
            echo "No pipeline output changes to commit."
            exit 0
          fi

          echo "Changed files:"
          echo "$changed_files"

          git add \
            data \
            last_linkedin_post.json \
            last_linkedin_post.enriched.json \
            Twitter/tweet.json \
            Twitter/posted_tweets.json \
            images

          git commit -m "chore(bot): update Webflow CMS pipeline outputs for $(date -u +'%Y-%m-%d')"

          git fetch origin main
          if ! git rebase origin/main; then
            echo "Rebase conflict; aborting and skipping push this run."
            git rebase --abort || true
            exit 0
          fi

          if git diff --quiet HEAD origin/main; then
            echo "Nothing new to push (already up to date)."
            exit 0
          fi

          git push origin HEAD:main
