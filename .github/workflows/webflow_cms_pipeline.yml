name: Webflow CMS Pipeline
concurrency:
  group: webflow-cms-pipeline
  cancel-in-progress: true

on:
  schedule:
    # GitHub schedules use UTC. 00:17 UTC avoids the busiest top-of-hour slot.
    - cron: '17 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-cms:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v6
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Webflow CMS pipeline
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5-nano
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_READ_AND_WRITE_BLOG_POSTS || vars.WEBFLOW_READ_AND_WRITE_BLOG_POSTS }}
          WEBFLOW_COLLECTION_ID: '63250855178122098387d7ef'
          WEBFLOW_PUBLISH: 'true'
          FORCE_WEBFLOW_SYNC: 'false'
          RUN_X_PIPELINE: 'false'
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          REQUIRE_X_POSTING: 'false'
        run: |
          set +e
          python -m pipeline.main
          status=$?
          set -e

          if [ "$status" -eq 2 ]; then
            echo "No recent LinkedIn posts found. Nothing to publish."
            exit 0
          fi

          exit "$status"

      - name: Commit and push pipeline outputs
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config pull.rebase true
          git config rebase.autoStash true

          changed_files=$(git status --porcelain -- \
            data \
            images)

          if [ -z "$changed_files" ]; then
            echo "No pipeline output changes to commit."
            exit 0
          fi

          echo "Changed files:"
          echo "$changed_files"

          git add \
            data \
            images

          git commit -m "chore(bot): update Webflow CMS pipeline outputs for $(date -u +'%Y-%m-%d')"

          git fetch origin main
          if ! git rebase origin/main; then
            echo "Rebase conflict; aborting and skipping push this run."
            git rebase --abort || true
            exit 0
          fi

          if git diff --quiet HEAD origin/main; then
            echo "Nothing new to push (already up to date)."
            exit 0
          fi

          git push origin HEAD:main
