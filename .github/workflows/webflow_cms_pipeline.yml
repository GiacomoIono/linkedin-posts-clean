name: Webflow CMS JSON Pipeline
concurrency:
  group: webflow-cms-json-pipeline
  cancel-in-progress: true

on:
  schedule:
    # GitHub schedules use UTC. These two slots cover 20:00 Europe/Zurich across DST.
    - cron: '0 18,19 * * *'
  workflow_dispatch:

jobs:
  publish-cms-json:
    runs-on: ubuntu-latest

    steps:
      - name: Check Zurich schedule time
        id: zurich_time
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          from datetime import datetime
          from zoneinfo import ZoneInfo

          now = datetime.now(ZoneInfo("Europe/Zurich"))
          should_run = now.hour == 20

          print(f"zurich_now={now.isoformat()}")
          print(f"run_cms_pipeline={'true' if should_run else 'false'}")
          PY

      - name: Skip scheduled non-8pm run
        if: github.event_name == 'schedule' && steps.zurich_time.outputs.run_cms_pipeline != 'true'
        run: |
          echo "Current Zurich time is ${{ steps.zurich_time.outputs.zurich_now }}."
          echo "Skipping this scheduled slot because the CMS pipeline runs at 20:00 Europe/Zurich."

      - name: Check out repo
        if: github.event_name == 'workflow_dispatch' || steps.zurich_time.outputs.run_cms_pipeline == 'true'
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        if: github.event_name == 'workflow_dispatch' || steps.zurich_time.outputs.run_cms_pipeline == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: github.event_name == 'workflow_dispatch' || steps.zurich_time.outputs.run_cms_pipeline == 'true'
        run: pip install -r requirements.txt

      - name: Set required env vars
        if: github.event_name == 'workflow_dispatch' || steps.zurich_time.outputs.run_cms_pipeline == 'true'
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          echo "LINKEDIN_ACCESS_TOKEN=$LINKEDIN_ACCESS_TOKEN" >> "$GITHUB_ENV"
          echo "OPENAI_API_KEY=$OPENAI_API_KEY" >> "$GITHUB_ENV"
          echo "X_API_KEY=$X_API_KEY" >> "$GITHUB_ENV"
          echo "X_API_SECRET=$X_API_SECRET" >> "$GITHUB_ENV"
          echo "X_ACCESS_TOKEN=$X_ACCESS_TOKEN" >> "$GITHUB_ENV"
          echo "X_ACCESS_TOKEN_SECRET=$X_ACCESS_TOKEN_SECRET" >> "$GITHUB_ENV"
          echo "REQUIRE_X_POSTING=false" >> "$GITHUB_ENV"

      - name: Fetch latest LinkedIn post
        if: github.event_name == 'workflow_dispatch' || steps.zurich_time.outputs.run_cms_pipeline == 'true'
        run: |
          set +e
          python fetch_posts.py
          status=$?
          set -e

          if [ "$status" -eq 2 ]; then
            echo "NO_POSTS_FOUND=true" >> "$GITHUB_ENV"
            echo "No recent LinkedIn posts found. Skipping enrichment and optional X steps."
            exit 0
          fi

          if [ "$status" -ne 0 ]; then
            echo "LinkedIn fetch failed with exit code $status."
            exit "$status"
          fi

          echo "NO_POSTS_FOUND=false" >> "$GITHUB_ENV"

      - name: Generate Webflow CMS JSON
        if: (github.event_name == 'workflow_dispatch' || steps.zurich_time.outputs.run_cms_pipeline == 'true') && env.NO_POSTS_FOUND != 'true'
        run: python enrich_post.py

      - name: Generate X draft (optional)
        if: (github.event_name == 'workflow_dispatch' || steps.zurich_time.outputs.run_cms_pipeline == 'true') && env.NO_POSTS_FOUND != 'true'
        run: |
          set +e
          python Twitter/tweetify_post.py
          status=$?

          if [ "$status" -ne 0 ]; then
            echo "::warning::tweetify_post.py failed with exit code $status. Continuing because X is optional."
          fi

          exit 0

      - name: Post to X (optional)
        if: (github.event_name == 'workflow_dispatch' || steps.zurich_time.outputs.run_cms_pipeline == 'true') && env.NO_POSTS_FOUND != 'true'
        run: |
          set +e
          python Twitter/post_tweet.py
          status=$?

          if [ "$status" -ne 0 ]; then
            echo "::warning::post_tweet.py failed with exit code $status. Continuing because X is optional."
          fi

          exit 0

      - name: Commit and push CMS results
        if: github.event_name == 'workflow_dispatch' || steps.zurich_time.outputs.run_cms_pipeline == 'true'
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config pull.rebase true
          git config rebase.autoStash true

          changed_files=$(git status --porcelain -- \
            last_linkedin_post.json \
            last_linkedin_post.enriched.json \
            Twitter/tweet.json \
            Twitter/posted_tweets.json \
            images)

          if [ -z "$changed_files" ]; then
            echo "No new post or changes to commit."
            exit 0
          fi

          echo "Changed files:"
          echo "$changed_files"

          git add \
            last_linkedin_post.json \
            last_linkedin_post.enriched.json \
            Twitter/tweet.json \
            Twitter/posted_tweets.json \
            images

          git commit -m "chore(bot): update CMS post files for $(date -u +'%Y-%m-%d')"

          git fetch origin main
          if ! git rebase origin/main; then
            echo "Rebase conflict; aborting and skipping push this run."
            git rebase --abort || true
            exit 0
          fi

          if git diff --quiet HEAD origin/main; then
            echo "Nothing new to push (already up to date)."
            exit 0
          fi

          git push origin HEAD:main
